<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="truck2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>

  <rect width="600" height="420" fill="url(#bg2)" rx="12"/>

  <!-- Road -->
  <rect x="0" y="310" width="600" height="110" fill="#374151" rx="0"/>
  <rect x="0" y="384" width="600" height="3" fill="#4b5563"/>
  <rect x="30"  y="350" width="100" height="7" rx="3" fill="#fbbf24" opacity="0.7"/>
  <rect x="200" y="350" width="100" height="7" rx="3" fill="#fbbf24" opacity="0.7"/>
  <rect x="370" y="350" width="100" height="7" rx="3" fill="#fbbf24" opacity="0.7"/>
  <rect x="540" y="350" width="60"  height="7" rx="3" fill="#fbbf24" opacity="0.7"/>

  <!-- Landscape -->
  <ellipse cx="80"  cy="310" rx="90" ry="30" fill="#d1fae5"/>
  <ellipse cx="500" cy="310" rx="80" ry="25" fill="#d1fae5"/>
  <ellipse cx="300" cy="315" rx="60" ry="18" fill="#a7f3d0"/>

  <!-- Trailer -->
  <rect x="20" y="190" width="360" height="130" rx="6" fill="url(#truck2)"/>
  <rect x="20" y="312" width="360" height="8"   rx="3" fill="#162d6e"/>
  <!-- stripe -->
  <rect x="20" y="236" width="360" height="40" fill="#F97316" opacity="0.15"/>
  <rect x="20" y="236" width="360" height="4"  fill="#F97316"/>
  <rect x="20" y="272" width="360" height="4"  fill="#F97316"/>
  <!-- label -->
  <text x="200" y="268" text-anchor="middle" font-family="Montserrat,Arial,sans-serif" font-weight="800" font-size="28" fill="white" letter-spacing="1">ALFA EXPRESS</text>
  <!-- vertical panels -->
  <line x1="152" y1="190" x2="152" y2="320" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <line x1="248" y1="190" x2="248" y2="320" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>

  <!-- Cab -->
  <path d="M380 215 L380 320 L510 320 L510 268 L462 215 Z" fill="#2563eb"/>
  <path d="M388 222 L455 222 L455 266 L388 266 Z" fill="#93c5fd" opacity="0.85"/>
  <path d="M460 228 L505 255 L505 266 L460 266 Z" fill="#bfdbfe" opacity="0.75"/>
  <line x1="421" y1="222" x2="421" y2="266" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
  <rect x="440" y="280" width="18" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
  <line x1="458" y1="222" x2="458" y2="320" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <!-- bumper -->
  <rect x="500" y="288" width="26" height="26" rx="4" fill="#374151"/>
  <!-- headlight -->
  <rect x="501" y="252" width="16" height="11" rx="3" fill="#fef9c3"/>
  <!-- running lights -->
  <rect x="502" y="244" width="12" height="5"  rx="2" fill="#F97316"/>
  <!-- mirror -->
  <rect x="506" y="232" width="14" height="9"  rx="2" fill="#1d4ed8"/>
  <!-- exhaust -->
  <rect x="487" y="168" width="7" height="50" rx="3" fill="#374151"/>
  <ellipse cx="490" cy="164" rx="9" ry="6" fill="#6b7280" opacity="0.3"/>
  <ellipse cx="493" cy="150" rx="7" ry="5" fill="#9ca3af" opacity="0.2"/>

  <!-- Wheels -->
  <circle cx="110" cy="330" r="30" fill="#111827"/><circle cx="110" cy="330" r="20" fill="#374151"/><circle cx="110" cy="330" r="9" fill="#111827"/><circle cx="110" cy="330" r="4" fill="#6b7280"/>
  <circle cx="220" cy="330" r="30" fill="#111827"/><circle cx="220" cy="330" r="20" fill="#374151"/><circle cx="220" cy="330" r="9" fill="#111827"/><circle cx="220" cy="330" r="4" fill="#6b7280"/>
  <circle cx="435" cy="330" r="26" fill="#111827"/><circle cx="435" cy="330" r="17" fill="#374151"/><circle cx="435" cy="330" r="8" fill="#111827"/><circle cx="435" cy="330" r="3" fill="#6b7280"/>
  <circle cx="482" cy="332" r="21" fill="#111827"/><circle cx="482" cy="332" r="14" fill="#374151"/><circle cx="482" cy="332" r="6" fill="#111827"/>

  <!-- Motion lines -->
  <line x1="0" y1="248" x2="18" y2="248" stroke="#F97316" stroke-width="4" opacity="0.8" stroke-linecap="round"/>
  <line x1="0" y1="262" x2="12" y2="262" stroke="#F97316" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
  <line x1="0" y1="274" x2="8"  y2="274" stroke="#F97316" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
</svg>
