<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 440">
  <defs>
    <linearGradient id="wbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>

  <rect width="600" height="440" fill="url(#wbg)" rx="12"/>

  <!-- Floor -->
  <rect x="0" y="340" width="600" height="100" fill="#e2e8f0" rx="0"/>
  <!-- Floor lines (perspective) -->
  <line x1="0" y1="340" x2="600" y2="340" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="100" y1="340" x2="300" y2="440" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="200" y1="340" x2="300" y2="440" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="300" y1="340" x2="300" y2="440" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="400" y1="340" x2="300" y2="440" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="500" y1="340" x2="300" y2="440" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Back wall -->
  <rect x="40" y="60" width="520" height="290" fill="url(#wall)" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Ceiling beams -->
  <rect x="40"  y="60" width="16" height="290" fill="#cbd5e1"/>
  <rect x="200" y="60" width="12" height="290" fill="#e2e8f0"/>
  <rect x="390" y="60" width="12" height="290" fill="#e2e8f0"/>
  <rect x="544" y="60" width="16" height="290" fill="#cbd5e1"/>
  <!-- Horizontal beam -->
  <rect x="40" y="60" width="520" height="14" fill="#cbd5e1"/>
  <rect x="40" y="120" width="520" height="6" fill="#e2e8f0"/>
  <rect x="40" y="180" width="520" height="6" fill="#e2e8f0"/>

  <!-- Racking - left section -->
  <!-- Shelf frame -->
  <rect x="60" y="130" width="6" height="200" fill="#94a3b8"/>
  <rect x="170" y="130" width="6" height="200" fill="#94a3b8"/>
  <!-- Shelf boards -->
  <rect x="60" y="148" width="116" height="8" fill="#64748b"/>
  <rect x="60" y="208" width="116" height="8" fill="#64748b"/>
  <rect x="60" y="268" width="116" height="8" fill="#64748b"/>
  <!-- Boxes on shelves -->
  <rect x="64" y="116" width="38" height="32" rx="2" fill="#F97316" opacity="0.8"/>
  <rect x="106" y="120" width="34" height="28" rx="2" fill="#1d4ed8" opacity="0.7"/>
  <rect x="64" y="176" width="32" height="32" rx="2" fill="#1d4ed8" opacity="0.8"/>
  <rect x="100" y="180" width="28" height="28" rx="2" fill="#7c3aed" opacity="0.7"/>
  <rect x="132" y="178" width="34" height="30" rx="2" fill="#F97316" opacity="0.6"/>
  <rect x="64" y="236" width="44" height="32" rx="2" fill="#059669" opacity="0.7"/>
  <rect x="112" y="238" width="30" height="30" rx="2" fill="#1d4ed8" opacity="0.6"/>
  <rect x="146" y="236" width="26" height="32" rx="2" fill="#F97316" opacity="0.7"/>

  <!-- Racking - right section -->
  <rect x="420" y="130" width="6" height="200" fill="#94a3b8"/>
  <rect x="530" y="130" width="6" height="200" fill="#94a3b8"/>
  <rect x="420" y="148" width="116" height="8" fill="#64748b"/>
  <rect x="420" y="208" width="116" height="8" fill="#64748b"/>
  <rect x="420" y="268" width="116" height="8" fill="#64748b"/>
  <!-- Boxes -->
  <rect x="424" y="116" width="40" height="32" rx="2" fill="#1d4ed8" opacity="0.8"/>
  <rect x="468" y="120" width="36" height="28" rx="2" fill="#F97316" opacity="0.7"/>
  <rect x="508" y="118" width="32" height="30" rx="2" fill="#059669" opacity="0.7"/>
  <rect x="424" y="176" width="34" height="32" rx="2" fill="#7c3aed" opacity="0.7"/>
  <rect x="462" y="178" width="38" height="30" rx="2" fill="#F97316" opacity="0.8"/>
  <rect x="504" y="176" width="30" height="32" rx="2" fill="#1d4ed8" opacity="0.6"/>
  <rect x="424" y="236" width="50" height="32" rx="2" fill="#F97316" opacity="0.7"/>
  <rect x="478" y="238" width="32" height="30" rx="2" fill="#1d4ed8" opacity="0.7"/>

  <!-- Forklift (center) -->
  <rect x="248" y="270" width="104" height="70" rx="4" fill="#1e3a8a"/>
  <rect x="252" y="275" width="45" height="40" rx="3" fill="#2563eb"/>
  <!-- Windshield -->
  <rect x="256" y="278" width="36" height="28" rx="2" fill="#93c5fd" opacity="0.8"/>
  <!-- Forks -->
  <rect x="348" y="310" width="40" height="6" rx="2" fill="#374151"/>
  <rect x="348" y="322" width="40" height="6" rx="2" fill="#374151"/>
  <!-- Mast -->
  <rect x="340" y="248" width="10" height="72" rx="2" fill="#374151"/>
  <rect x="344" y="255" width="2"  height="60" fill="#4b5563"/>
  <!-- Wheels -->
  <circle cx="268" cy="342" r="12" fill="#111827"/><circle cx="268" cy="342" r="7" fill="#374151"/>
  <circle cx="330" cy="342" r="12" fill="#111827"/><circle cx="330" cy="342" r="7" fill="#374151"/>
  <!-- Pallet on forks -->
  <rect x="354" y="290" width="34" height="22" rx="2" fill="#92400e" opacity="0.8"/>
  <rect x="356" y="292" width="30" height="18" rx="1" fill="#F97316" opacity="0.9"/>
  <text x="371" y="305" text-anchor="middle" font-family="Montserrat,Arial,sans-serif" font-size="7" font-weight="700" fill="white">AE</text>

  <!-- Ceiling lights -->
  <rect x="140" y="60" width="40" height="8" rx="3" fill="#fef3c7"/>
  <rect x="280" y="60" width="40" height="8" rx="3" fill="#fef3c7"/>
  <rect x="420" y="60" width="40" height="8" rx="3" fill="#fef3c7"/>
  <!-- Light glow -->
  <ellipse cx="160" cy="90" rx="50" ry="20" fill="#fef9c3" opacity="0.25"/>
  <ellipse cx="300" cy="90" rx="50" ry="20" fill="#fef9c3" opacity="0.25"/>
  <ellipse cx="440" cy="90" rx="50" ry="20" fill="#fef9c3" opacity="0.25"/>

  <!-- Label -->
  <text x="300" y="425" text-anchor="middle" font-family="Montserrat,Arial,sans-serif" font-weight="700" font-size="13" fill="#1e3a8a" opacity="0.55">Modern Warehousing &amp; Fulfilment</text>
</svg>
