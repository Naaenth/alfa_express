<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 460">
  <!-- Sky gradient background -->
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0eaff"/>
      <stop offset="100%" stop-color="#f0f4ff"/>
    </linearGradient>
    <linearGradient id="roadGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="truckBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="trailerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="560" height="460" fill="url(#skyGrad)" rx="12"/>

  <!-- Clouds -->
  <ellipse cx="80" cy="60" rx="55" ry="22" fill="white" opacity="0.8"/>
  <ellipse cx="110" cy="48" rx="40" ry="20" fill="white" opacity="0.9"/>
  <ellipse cx="420" cy="80" rx="60" ry="20" fill="white" opacity="0.7"/>
  <ellipse cx="460" cy="68" rx="44" ry="18" fill="white" opacity="0.85"/>
  <ellipse cx="280" cy="45" rx="50" ry="18" fill="white" opacity="0.6"/>

  <!-- Horizon / Ground -->
  <rect x="0" y="310" width="560" height="150" fill="#e5e7eb" rx="0"/>
  <rect x="0" y="340" width="560" height="120" fill="url(#roadGrad)" rx="0"/>

  <!-- Road markings -->
  <rect x="0" y="390" width="560" height="4" fill="#4b5563" opacity="0.5"/>
  <rect x="40"  y="374" width="80" height="6" rx="3" fill="#fbbf24" opacity="0.7"/>
  <rect x="180" y="374" width="80" height="6" rx="3" fill="#fbbf24" opacity="0.7"/>
  <rect x="320" y="374" width="80" height="6" rx="3" fill="#fbbf24" opacity="0.7"/>
  <rect x="460" y="374" width="80" height="6" rx="3" fill="#fbbf24" opacity="0.7"/>

  <!-- ===== TRUCK ===== -->
  <!-- Trailer body -->
  <rect x="30" y="215" width="330" height="135" rx="6" fill="url(#trailerGrad)"/>
  <!-- Trailer panel lines -->
  <line x1="30" y1="255" x2="360" y2="255" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <line x1="30" y1="295" x2="360" y2="295" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <line x1="140" y1="215" x2="140" y2="350" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <line x1="250" y1="215" x2="250" y2="350" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <!-- Trailer logo area -->
  <rect x="50" y="230" width="290" height="95" rx="4" fill="rgba(255,255,255,0.06)"/>
  <text x="195" y="278" text-anchor="middle" font-family="Montserrat,Arial,sans-serif" font-weight="800" font-size="26" fill="white" letter-spacing="2">ALFA EXPRESS</text>
  <text x="195" y="308" text-anchor="middle" font-family="Montserrat,Arial,sans-serif" font-weight="600" font-size="12" fill="#F97316" letter-spacing="3">LOGISTICS · TRANSPORT</text>
  <!-- Trailer bottom rail -->
  <rect x="30" y="342" width="330" height="10" rx="3" fill="#162d6e"/>
  <!-- Trailer doors hint (rear) -->
  <rect x="354" y="215" width="6" height="135" rx="2" fill="#1e3a8a"/>

  <!-- Cab -->
  <path d="M360 240 L360 350 L490 350 L490 290 L445 240 Z" fill="url(#truckBody)"/>
  <!-- Cab highlight -->
  <path d="M362 242 L362 290 L445 290 L440 242 Z" fill="rgba(255,255,255,0.06)"/>
  <!-- Windshield -->
  <path d="M373 248 L438 248 L438 288 L373 288 Z" rx="4" fill="#bfdbfe" opacity="0.9"/>
  <line x1="406" y1="248" x2="406" y2="288" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <!-- Side window -->
  <path d="M443 260 L484 282 L484 288 L443 288 Z" fill="#93c5fd" opacity="0.8"/>
  <!-- Cab door handle -->
  <rect x="400" y="308" width="20" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
  <!-- Cab door line -->
  <line x1="440" y1="248" x2="440" y2="350" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <!-- Front bumper -->
  <rect x="480" y="316" width="28" height="28" rx="4" fill="#374151"/>
  <rect x="483" y="320" width="22" height="6" rx="2" fill="#4b5563"/>
  <!-- Grille -->
  <rect x="483" y="330" width="22" height="3" rx="1" fill="#6b7280"/>
  <rect x="483" y="336" width="22" height="3" rx="1" fill="#6b7280"/>
  <!-- Headlight -->
  <rect x="482" y="278" width="18" height="12" rx="3" fill="#fef3c7"/>
  <rect x="485" y="281" width="12" height="6" rx="2" fill="#fde68a" opacity="0.9"/>
  <!-- Running lights -->
  <rect x="484" y="268" width="12" height="5" rx="2" fill="#F97316" opacity="0.9"/>
  <!-- Side mirror -->
  <rect x="494" y="258" width="14" height="10" rx="2" fill="#1d4ed8"/>
  <line x1="494" y1="263" x2="508" y2="263" stroke="#1e3a8a" stroke-width="1"/>
  <!-- Exhaust stack -->
  <rect x="465" y="195" width="7" height="50" rx="3" fill="#374151"/>
  <ellipse cx="468" cy="192" rx="5" ry="4" fill="#4b5563"/>
  <!-- Exhaust smoke -->
  <ellipse cx="468" cy="178" rx="8" ry="6" fill="#9ca3af" opacity="0.25"/>
  <ellipse cx="472" cy="162" rx="6" ry="5" fill="#9ca3af" opacity="0.18"/>

  <!-- Wheels -->
  <!-- Trailer front axle -->
  <circle cx="110" cy="358" r="32" fill="#1f2937"/>
  <circle cx="110" cy="358" r="22" fill="#374151"/>
  <circle cx="110" cy="358" r="10" fill="#111827"/>
  <circle cx="110" cy="358" r="5"  fill="#6b7280"/>
  <!-- Trailer rear axle -->
  <circle cx="230" cy="358" r="32" fill="#1f2937"/>
  <circle cx="230" cy="358" r="22" fill="#374151"/>
  <circle cx="230" cy="358" r="10" fill="#111827"/>
  <circle cx="230" cy="358" r="5"  fill="#6b7280"/>
  <!-- Cab drive axle -->
  <circle cx="420" cy="358" r="28" fill="#1f2937"/>
  <circle cx="420" cy="358" r="19" fill="#374151"/>
  <circle cx="420" cy="358" r="9"  fill="#111827"/>
  <circle cx="420" cy="358" r="4"  fill="#6b7280"/>
  <!-- Cab steer axle -->
  <circle cx="470" cy="360" r="22" fill="#1f2937"/>
  <circle cx="470" cy="360" r="15" fill="#374151"/>
  <circle cx="470" cy="360" r="7"  fill="#111827"/>
  <circle cx="470" cy="360" r="3"  fill="#6b7280"/>

  <!-- Speed motion lines -->
  <line x1="0"  y1="270" x2="25" y2="270" stroke="#F97316" stroke-width="4" opacity="0.8" stroke-linecap="round"/>
  <line x1="0"  y1="285" x2="18" y2="285" stroke="#F97316" stroke-width="3" opacity="0.55" stroke-linecap="round"/>
  <line x1="0"  y1="298" x2="12" y2="298" stroke="#F97316" stroke-width="2" opacity="0.35" stroke-linecap="round"/>
  <line x1="0"  y1="308" x2="8"  y2="308" stroke="#F97316" stroke-width="2" opacity="0.2" stroke-linecap="round"/>

  <!-- Distance marker / route dot -->
  <circle cx="520" cy="150" r="12" fill="#F97316" opacity="0.15"/>
  <circle cx="520" cy="150" r="6"  fill="#F97316" opacity="0.5"/>
  <circle cx="520" cy="150" r="3"  fill="#F97316"/>
  <line x1="520" y1="162" x2="520" y2="220" stroke="#F97316" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.4"/>

  <circle cx="70" cy="160" r="10" fill="#10b981" opacity="0.15"/>
  <circle cx="70" cy="160" r="5"  fill="#10b981" opacity="0.5"/>
  <circle cx="70" cy="160" r="2.5" fill="#10b981"/>
</svg>
